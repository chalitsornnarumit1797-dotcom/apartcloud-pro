<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApartCloud PRO Cloud</title>
    
    <!-- 1. เชื่อมต่อ CSS และ Font -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. เชื่อมต่อ React, Babel และ Lucide (ใช้เวอร์ชันสำหรับเบราว์เซอร์) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- ใช้ lucide ปกติสำหรับการรันใน Single HTML จะเสถียรกว่า -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 3. ส่วนเชื่อมต่อ Firebase Cloud -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // ⚠️ สำคัญมาก: นำค่าจาก Firebase Console ของคุณมาวางที่นี่
        const firebaseConfig = {
            apiKey: "ใส่_API_KEY_ของคุณที่นี่",
            authDomain: "apartcloud-41240.firebaseapp.com",
            projectId: "apartcloud-41240",
            storageBucket: "apartcloud-41240.appspot.com",
            messagingSenderId: "ใส่_SENDER_ID_ของคุณที่นี่",
            appId: "ใส่_APP_ID_ของคุณที่นี่"
        };

        window.fbSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, onSnapshot, query, addDoc, deleteDoc };
        window.fbConfig = firebaseConfig;
    </script>

    <style>
        body { font-family: 'Prompt', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media print { .no-print { display: none !important; } }
        /* สไตล์เสริมสำหรับไอคอนที่โหลดผ่าน lucide.createIcons */
        .lucide {
            width: 1.25rem;
            height: 1.25rem;
            display: inline-block;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // รหัสผ่านที่คุณกำหนดไว้
        const ACCESS_PIN = "933979"; 
        const APP_ID = "apartcloud-pro-v1";

        const STATUS_CONFIG = {
            available: { label: 'พร้อมขาย', color: 'bg-emerald-500', text: 'text-white', light: 'bg-emerald-50', border: 'border-emerald-200', iconColor: 'text-emerald-600' },
            maintenance: { label: 'รอซ่อม', color: 'bg-orange-600', text: 'text-white', light: 'bg-orange-50', border: 'border-orange-200', iconColor: 'text-orange-600' },
            appointment: { label: 'นัดดูห้อง', color: 'bg-sky-400', text: 'text-white', light: 'bg-sky-50', border: 'border-sky-200', iconColor: 'text-sky-600' },
            booked: { label: 'จองแล้ว', color: 'bg-rose-500', text: 'text-white', light: 'bg-rose-50', border: 'border-rose-200', iconColor: 'text-rose-600' },
            notice: { label: 'แจ้งออก', color: 'bg-amber-500', text: 'text-white', light: 'bg-amber-50', border: 'border-amber-200', iconColor: 'text-amber-600' },
            occupied: { label: 'มีผู้เช่า', color: 'bg-blue-600', text: 'text-white', light: 'bg-blue-50', border: 'border-blue-200', iconColor: 'text-blue-600' },
        };

        const PROPERTIES = [
            { id: 'mangmee', name: 'บ้านมั่งมีทวีสุข', floors: [
                { level: 6, price: "5,900", rooms: Array.from({ length: 18 }, (_, i) => `6${String(i + 1).padStart(2, '0')}`) },
                { level: 5, price: "5,900", rooms: Array.from({ length: 18 }, (_, i) => `5${String(i + 1).padStart(2, '0')}`) },
                { level: 4, price: "5,500", rooms: Array.from({ length: 18 }, (_, i) => `4${String(i + 1).padStart(2, '0')}`) },
                { level: 3, price: "5,500", rooms: Array.from({ length: 18 }, (_, i) => `3${String(i + 1).padStart(2, '0')}`) },
                { level: 2, price: "5,000", rooms: Array.from({ length: 18 }, (_, i) => `2${String(i + 1).padStart(2, '0')}`) }
            ]},
            { id: 'mytree', name: 'บ้านมายทรี 48', floors: [
                { level: 5, price: "4,500", rooms: ['501','502','503','505','506','507','508','509','510','511','512','513','514','515'] },
                { level: 1, price: "4,000", rooms: Array.from({ length: 11 }, (_, i) => `1${String(i + 1).padStart(2, '0')}`) }
            ]},
            { id: 'khunluang', name: 'บ้านคุณหลวง', floors: [
                { level: 4, rooms: ['4/1','4/2','4/3','4/4','4/5','4/6'], customPrices: {'4/1': '4,000', '4/6': '5,000'} },
                { level: 1, rooms: Array.from({ length: 18 }, (_, i) => `1/${i + 1}`), customPrices: {'1/12': '4,200'} }
            ]},
            { id: 'meesap', name: 'อพาร์ทเม้นท์มีทรัพย์', floors: Array.from({ length: 5 }, (_, i) => ({ level: 5 - i, price: "4,800", rooms: Array.from({ length: 6 }, (_, j) => `${5 - i}.${j + 1}`) })) },
            { id: 'meethong', name: 'อพาร์ทเม้นท์มีทอง', floors: Array.from({ length: 5 }, (_, i) => { const lv = 5 - i; return { level: lv, rooms: lv === 1 ? Array.from({ length: 11 }, (_, j) => `${102 + j}`) : Array.from({ length: 13 }, (_, j) => `${lv}${String(j + 1).padStart(2, '0')}`) }; }) }
        ];

        function App() {
            const [isUnlocked, setIsUnlocked] = useState(() => localStorage.getItem('apt_unlocked') === 'true');
            const [pinInput, setPinInput] = useState("");
            const [activePropertyId, setActivePropertyId] = useState(PROPERTIES[0].id);
            const [roomStates, setRoomStates] = useState({});
            const [view, setView] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [db, setDb] = useState(null);

            // ใช้ useEffect เพื่ออัปเดตไอคอนเมื่อมีการเปลี่ยน view หรือสถานะห้อง
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [isUnlocked, view, activePropertyId, roomStates, loading]);

            useEffect(() => {
                const { initializeApp, getAuth, signInAnonymously, getFirestore, collection, onSnapshot } = window.fbSDK;
                try {
                    const app = initializeApp(window.fbConfig);
                    const firestore = getFirestore(app);
                    setDb(firestore);

                    signInAnonymously(getAuth(app)).then(() => {
                        onSnapshot(collection(firestore, 'artifacts', APP_ID, 'public', 'data', 'rooms'), (snap) => {
                            const data = {};
                            snap.forEach(d => data[d.id] = d.data());
                            setRoomStates(data);
                            setLoading(false);
                        });
                    });
                } catch (e) { setLoading(false); }
            }, []);

            if (!isUnlocked) {
                return (
                    <div className="h-screen bg-slate-900 flex items-center justify-center p-4">
                        <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center space-y-6 shadow-2xl">
                            <div className="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg">
                                <i data-lucide="lock" className="text-white w-8 h-8"></i>
                            </div>
                            <h2 className="text-3xl font-black italic tracking-tighter text-slate-800">ACCESS PIN</h2>
                            <input 
                                type="password" 
                                value={pinInput} 
                                onChange={(e) => setPinInput(e.target.value)} 
                                placeholder="ENTER PIN" 
                                className="w-full bg-slate-100 p-5 rounded-2xl text-center text-3xl font-black tracking-[0.4em] outline-none" 
                                autoFocus 
                            />
                            <button 
                                onClick={() => { 
                                    if(pinInput===ACCESS_PIN){ 
                                        setIsUnlocked(true); 
                                        localStorage.setItem('apt_unlocked','true'); 
                                    } else { 
                                        setPinInput(""); 
                                    } 
                                }} 
                                className="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all"
                            >
                                ปลดล็อก
                            </button>
                        </div>
                    </div>
                );
            }

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center text-indigo-600">
                    <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="font-bold animate-pulse tracking-widest">CONNECTING TO CLOUD...</p>
                </div>
            );

            const activeProperty = PROPERTIES.find(p => p.id === activePropertyId);

            return (
                <div className="min-h-screen">
                    <nav className="bg-white border-b p-4 flex justify-between items-center shadow-sm sticky top-0 z-50 no-print">
                        <div className="font-black italic text-indigo-600 flex items-center gap-2 text-2xl tracking-tighter">
                            <i data-lucide="building-2" className="w-6 h-6"></i> ApartCloud PRO
                        </div>
                        <div className="flex gap-2">
                            <button 
                                onClick={() => setView('dashboard')} 
                                className={`p-2 px-4 rounded-xl font-bold text-xs flex items-center gap-2 ${view==='dashboard'?'bg-indigo-600 text-white shadow-lg shadow-indigo-100':'text-slate-400'}`}
                            >
                                <i data-lucide="layout-dashboard" className="w-4 h-4"></i> แดชบอร์ด
                            </button>
                            <button 
                                onClick={() => { 
                                    setIsUnlocked(false); 
                                    localStorage.removeItem('apt_unlocked'); 
                                }} 
                                className="p-2 text-slate-300 hover:text-rose-500 transition-colors"
                            >
                                <i data-lucide="unlock" className="w-5 h-5"></i>
                            </button>
                        </div>
                    </nav>

                    <main className="p-4 max-w-6xl mx-auto">
                        <div className="flex overflow-x-auto gap-2 no-scrollbar mb-6 pb-2">
                            {PROPERTIES.map(p => (
                                <button 
                                    key={p.id} 
                                    onClick={() => setActivePropertyId(p.id)} 
                                    className={`px-6 py-2.5 rounded-2xl border-2 font-black whitespace-nowrap transition-all active:scale-95 ${activePropertyId === p.id ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl shadow-indigo-100' : 'bg-white text-slate-500 border-slate-100'}`}
                                >
                                    {p.name}
                                </button>
                            ))}
                        </div>
                        {[...activeProperty.floors].reverse().map(floor => (
                            <div key={floor.level} className="bg-white p-8 rounded-[2.5rem] border shadow-sm mb-6 relative overflow-hidden">
                                <div className="absolute left-0 top-0 w-1.5 h-full bg-indigo-500"></div>
                                <h3 className="text-[10px] font-black text-slate-300 mb-4 uppercase tracking-widest ml-2">ชั้น {floor.level}</h3>
                                <div className="grid grid-cols-3 sm:grid-cols-6 md:grid-cols-8 gap-3">
                                    {floor.rooms.map(r => {
                                        const id = `${activePropertyId}_${r}`;
                                        const info = roomStates[id] || { status: 'available' };
                                        return (
                                            <button 
                                                key={r} 
                                                className={`p-4 rounded-2xl font-black text-center transition active:scale-90 ${STATUS_CONFIG[info.status].color} ${STATUS_CONFIG[info.status].text}`}
                                            >
                                                <div className="text-xl leading-none mb-1 tracking-tighter">{r}</div>
                                                <div className="text-[7px] opacity-70 italic">฿ {info.price || floor.price}</div>
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
