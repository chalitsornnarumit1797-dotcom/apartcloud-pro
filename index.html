<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApartCloud PRO Cloud</title>
    
    <!-- 1. เชื่อมต่อ CSS และ Font -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. เชื่อมต่อ React, Babel และ Lucide (ใช้เวอร์ชันสำหรับเบราว์เซอร์) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 3. ส่วนเชื่อมต่อ Firebase Cloud -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        /**
         * ⚠️ ขั้นตอนแก้ไขข้อผิดพลาด "api-key-not-valid" ⚠️
         * คุณต้องนำค่าจริงจาก Firebase Console มาใส่แทนที่ข้อความภาษาไทยด้านล่างนี้
         * 1. เข้า Firebase Console > Project Settings > General
         * 2. เลื่อนลงไปที่ "Your apps" แล้วก๊อปปี้ค่า apiKey มาใส่
         */
        const firebaseConfig = {
            apiKey: "ใส่_API_KEY_ของคุณที่นี่",
            authDomain: "apartcloud-41240.firebaseapp.com",
            projectId: "apartcloud-41240",
            storageBucket: "apartcloud-41240.appspot.com",
            messagingSenderId: "ใส่_SENDER_ID_ของคุณที่นี่",
            appId: "apartcloud-41240"
        };

        window.fbSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, onSnapshot, query, addDoc, deleteDoc };
        window.fbConfig = firebaseConfig;
    </script>

    <style>
        body { font-family: 'Prompt', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media print { .no-print { display: none !important; } }
        .lucide { width: 1.25rem; height: 1.25rem; display: inline-block; }
        .dot-flashing {
            position: relative; width: 10px; height: 10px; border-radius: 5px; background-color: #6366f1; color: #6366f1;
            animation: dot-flashing 1s infinite linear alternate; animation-delay: .5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: ''; display: inline-block; position: absolute; top: 0; width: 10px; height: 10px; border-radius: 5px; background-color: #6366f1; color: #6366f1;
            animation: dot-flashing 1s infinite linear alternate;
        }
        .dot-flashing::before { left: -15px; animation-delay: 0s; }
        .dot-flashing::after { left: 15px; animation-delay: 1s; }
        @keyframes dot-flashing { 0% { background-color: #6366f1; } 50%, 100% { background-color: #ebebef; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const ACCESS_PIN = "933979"; 
        const APP_ID = "apartcloud-pro-v1";

        const STATUS_CONFIG = {
            available: { label: 'พร้อมขาย', color: 'bg-emerald-500', text: 'text-white', light: 'bg-emerald-50', border: 'border-emerald-200', iconColor: 'text-emerald-600' },
            maintenance: { label: 'รอซ่อม', color: 'bg-orange-600', text: 'text-white', light: 'bg-orange-50', border: 'border-orange-200', iconColor: 'text-orange-600' },
            appointment: { label: 'นัดดูห้อง', color: 'bg-sky-400', text: 'text-white', light: 'bg-sky-50', border: 'border-sky-200', iconColor: 'text-sky-600' },
            booked: { label: 'จองแล้ว', color: 'bg-rose-500', text: 'text-white', light: 'bg-rose-50', border: 'border-rose-200', iconColor: 'text-rose-600' },
            notice: { label: 'แจ้งออก', color: 'bg-amber-500', text: 'text-white', light: 'bg-amber-50', border: 'border-amber-200', iconColor: 'text-amber-600' },
            occupied: { label: 'มีผู้เช่า', color: 'bg-blue-600', text: 'text-white', light: 'bg-blue-50', border: 'border-blue-200', iconColor: 'text-blue-600' },
        };

        const PROPERTIES = [
            { id: 'mangmee', name: 'บ้านมั่งมีทวีสุข', floors: [
                { level: 6, price: "5,900", rooms: Array.from({ length: 18 }, (_, i) => `6${String(i + 1).padStart(2, '0')}`) },
                { level: 5, price: "5,900", rooms: Array.from({ length: 18 }, (_, i) => `5${String(i + 1).padStart(2, '0')}`) },
                { level: 4, price: "5,500", rooms: Array.from({ length: 18 }, (_, i) => `4${String(i + 1).padStart(2, '0')}`) },
                { level: 3, price: "5,500", rooms: Array.from({ length: 18 }, (_, i) => `3${String(i + 1).padStart(2, '0')}`) },
                { level: 2, price: "5,000", rooms: Array.from({ length: 18 }, (_, i) => `2${String(i + 1).padStart(2, '0')}`) }
            ]},
            { id: 'mytree', name: 'บ้านมายทรี 48', floors: [
                { level: 5, price: "4,500", rooms: ['501','502','503','505','506','507','508','509','510','511','512','513','514','515'] },
                { level: 1, price: "4,000", rooms: Array.from({ length: 11 }, (_, i) => `1${String(i + 1).padStart(2, '0')}`) }
            ]},
            { id: 'khunluang', name: 'บ้านคุณหลวง', floors: [
                { level: 4, rooms: ['4/1','4/2','4/3','4/4','4/5','4/6'], customPrices: {'4/1': '4,000', '4/6': '5,000'} },
                { level: 1, rooms: Array.from({ length: 18 }, (_, i) => `1/${i + 1}`), customPrices: {'1/12': '4,200'} }
            ]},
            { id: 'meesap', name: 'อพาร์ทเม้นท์มีทรัพย์', floors: Array.from({ length: 5 }, (_, i) => ({ level: 5 - i, price: "4,800", rooms: Array.from({ length: 6 }, (_, j) => `${5 - i}.${j + 1}`) })) },
            { id: 'meethong', name: 'อพาร์ทเม้นท์มีทอง', floors: Array.from({ length: 5 }, (_, i) => { const lv = 5 - i; return { level: lv, rooms: lv === 1 ? Array.from({ length: 11 }, (_, j) => `${102 + j}`) : Array.from({ length: 13 }, (_, j) => `${lv}${String(j + 1).padStart(2, '0')}`) }; }) }
        ];

        function App() {
            const [isUnlocked, setIsUnlocked] = useState(() => localStorage.getItem('apt_unlocked') === 'true');
            const [pinInput, setPinInput] = useState("");
            const [activePropertyId, setActivePropertyId] = useState(PROPERTIES[0].id);
            const [roomStates, setRoomStates] = useState({});
            const [view, setView] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [loadingError, setLoadingError] = useState(false);
            const [errorMessage, setErrorMessage] = useState("");
            const [selectedRoom, setSelectedRoom] = useState(null);
            const [tempStatus, setTempStatus] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [db, setDb] = useState(null);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [isUnlocked, view, activePropertyId, roomStates, loading, loadingError, selectedRoom]);

            useEffect(() => {
                const { initializeApp, getAuth, signInAnonymously, getFirestore, collection, onSnapshot } = window.fbSDK;
                
                // ตรวจสอบเบื้องต้นว่าใส่ API Key หรือยัง
                if (!window.fbConfig.apiKey || window.fbConfig.apiKey.includes("ใส่_API_KEY")) {
                    setErrorMessage("Firebase API Key ไม่ถูกต้องหรือยังไม่ได้ระบุ");
                    setLoadingError(true);
                    return;
                }

                try {
                    const app = initializeApp(window.fbConfig);
                    const firestore = getFirestore(app);
                    const auth = getAuth(app);
                    setDb(firestore);

                    signInAnonymously(auth).then(() => {
                        onSnapshot(collection(firestore, 'artifacts', APP_ID, 'public', 'data', 'rooms'), (snap) => {
                            const data = {};
                            snap.forEach(d => data[d.id] = d.data());
                            setRoomStates(data);
                            setLoading(false);
                            setLoadingError(false);
                        }, (err) => {
                            console.error("Firestore Error:", err);
                            setErrorMessage("ไม่สามารถดึงข้อมูลจาก Cloud ได้");
                            setLoadingError(true);
                        });
                    }).catch(err => {
                        console.error("Auth Error:", err);
                        setErrorMessage("API Key ไม่ถูกต้อง กรุณาตรวจสอบใน Firebase Console");
                        setLoadingError(true);
                    });
                } catch (e) { 
                    console.error("Init Error:", e);
                    setErrorMessage("โครงสร้าง Firebase Config ผิดพลาด");
                    setLoadingError(true); 
                }
            }, []);

            const handleUpdateStatus = async (e) => {
                e.preventDefault();
                if (!db) {
                    // Demo Mode Save
                    const id = `${activePropertyId}_${selectedRoom}`;
                    setRoomStates(prev => ({ ...prev, [id]: { status: tempStatus, price: e.target.customPrice.value } }));
                    setSelectedRoom(null);
                    return;
                }
                const { doc, setDoc } = window.fbSDK;
                setIsSaving(true);
                const formData = new FormData(e.target);
                const id = `${activePropertyId}_${selectedRoom}`;
                try {
                    await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'rooms', id), {
                        status: tempStatus,
                        price: formData.get('customPrice'),
                        updatedAt: Date.now()
                    }, { merge: true });
                    setSelectedRoom(null);
                } catch (err) { console.error(err); } finally { setIsSaving(false); }
            };

            if (loading && !loadingError) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white text-indigo-600 p-6 text-center">
                    <div className="dot-flashing mb-8"></div>
                    <p className="font-black italic tracking-[0.2em] text-sm animate-pulse uppercase">Connecting to Cloud...</p>
                </div>
            );

            if (loadingError && loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-50 p-10 text-center">
                    <div className="w-20 h-20 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mb-6">
                        <i data-lucide="shield-alert" className="w-10 h-10"></i>
                    </div>
                    <h2 className="text-2xl font-black text-slate-800 mb-2">ข้อผิดพลาด API Key</h2>
                    <p className="text-slate-400 text-sm mb-8 leading-relaxed max-w-xs mx-auto">
                        {errorMessage} <br/> 
                        <span className="text-[10px] mt-2 block italic text-slate-300">(Firebase: Error auth/api-key-not-valid)</span>
                    </p>
                    <div className="space-y-3 w-full max-w-xs">
                        <button 
                            onClick={() => window.location.reload()} 
                            className="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold flex items-center justify-center gap-2"
                        >
                            <i data-lucide="refresh-cw" className="w-4 h-4"></i> ลองใหม่อีกครั้ง
                        </button>
                        <button 
                            onClick={() => { setLoading(false); setLoadingError(false); setDb(null); }} 
                            className="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-xl shadow-indigo-100"
                        >
                            <i data-lucide="play" className="w-4 h-4"></i> ข้ามไปโหมดทดลอง (DEMO)
                        </button>
                    </div>
                </div>
            );

            if (!isUnlocked) {
                return (
                    <div className="h-screen bg-slate-900 flex items-center justify-center p-4">
                        <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center space-y-6 shadow-2xl">
                            <div className="w-20 h-20 bg-indigo-600 rounded-[2rem] mx-auto flex items-center justify-center shadow-xl shadow-indigo-500/20">
                                <i data-lucide="lock" className="text-white w-10 h-10"></i>
                            </div>
                            <h2 className="text-3xl font-black italic tracking-tighter text-slate-800 uppercase leading-none">Access PIN</h2>
                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">กรุณากรอกรหัสผ่านเพื่อเข้าสู่ระบบ</p>
                            <input 
                                type="password" 
                                value={pinInput} 
                                onChange={(e) => setPinInput(e.target.value)} 
                                placeholder="ENTER PIN" 
                                className="w-full bg-slate-50 p-5 rounded-2xl text-center text-3xl font-black tracking-[0.4em] outline-none border-2 border-slate-100 focus:border-indigo-500 transition-all" 
                                autoFocus 
                            />
                            <button 
                                onClick={() => { if(pinInput===ACCESS_PIN){ setIsUnlocked(true); localStorage.setItem('apt_unlocked','true'); } else { setPinInput(""); } }} 
                                className="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black text-xl shadow-xl hover:bg-indigo-700 active:scale-95 transition-all"
                            >
                                UNLOCK SYSTEM
                            </button>
                        </div>
                    </div>
                );
            }

            const activeProperty = PROPERTIES.find(p => p.id === activePropertyId);

            return (
                <div className="min-h-screen pb-10 bg-slate-50">
                    <nav className="bg-white border-b p-4 flex justify-between items-center shadow-sm sticky top-0 z-50 no-print">
                        <div className="font-black italic text-indigo-600 flex items-center gap-2 text-2xl tracking-tighter">
                            <i data-lucide="building-2" className="w-6 h-6"></i> ApartCloud PRO
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setView('dashboard')} className={`p-2 px-4 rounded-xl font-bold text-xs ${view==='dashboard'?'bg-indigo-600 text-white shadow-lg':'text-slate-400'}`}>แดชบอร์ด</button>
                            <button onClick={() => setView('summary')} className={`p-2 px-4 rounded-xl font-bold text-xs ${view==='summary'?'bg-indigo-600 text-white shadow-lg':'text-slate-400'}`}>รายงาน</button>
                            <button onClick={() => { setIsUnlocked(false); localStorage.removeItem('apt_unlocked'); }} className="p-2 text-slate-300 hover:text-rose-500 transition-colors">
                                <i data-lucide="power" className="w-5 h-5"></i>
                            </button>
                        </div>
                    </nav>

                    <main className="p-4 max-w-6xl mx-auto">
                        {!db && (
                            <div className="bg-amber-50 border-2 border-amber-200 p-3 rounded-2xl mb-6 flex items-center gap-3 text-amber-700 font-bold text-xs no-print animate-pulse">
                                <i data-lucide="info" className="w-4 h-4"></i>
                                กำลังอยู่ในโหมดทดลอง (DEMO) ข้อมูลจะไม่ถูกบันทึกลง Cloud จริง
                            </div>
                        )}
                        {view === 'dashboard' ? (
                            <div className="space-y-6">
                                <div className="flex overflow-x-auto gap-2 no-scrollbar pb-2">
                                    {PROPERTIES.map(p => (
                                        <button 
                                            key={p.id} 
                                            onClick={() => setActivePropertyId(p.id)} 
                                            className={`px-6 py-2.5 rounded-2xl border-2 font-black whitespace-nowrap transition-all active:scale-95 ${activePropertyId === p.id ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl shadow-indigo-100' : 'bg-white text-slate-400 border-slate-100'}`}
                                        >
                                            {p.name}
                                        </button>
                                    ))}
                                </div>
                                {[...activeProperty.floors].reverse().map(floor => (
                                    <div key={floor.level} className="bg-white p-8 rounded-[2.5rem] border shadow-sm mb-6 relative overflow-hidden">
                                        <div className="absolute left-0 top-0 w-1.5 h-full bg-indigo-500"></div>
                                        <h3 className="font-black text-slate-300 text-[10px] uppercase mb-5 tracking-[0.3em] ml-2">FLOOR {floor.level}</h3>
                                        <div className="grid grid-cols-3 sm:grid-cols-6 md:grid-cols-8 gap-3">
                                            {floor.rooms.map(r => {
                                                const id = `${activePropertyId}_${r}`;
                                                const info = roomStates[id] || { status: 'available' };
                                                return (
                                                    <button 
                                                        key={r} 
                                                        onClick={() => { setSelectedRoom(r); setTempStatus(info.status); }}
                                                        className={`p-4 rounded-2xl font-black text-center transition active:scale-90 hover:shadow-lg ${STATUS_CONFIG[info.status].color} ${STATUS_CONFIG[info.status].text}`}
                                                    >
                                                        <div className="text-xl leading-none mb-1 tracking-tighter">{r}</div>
                                                        <div className="text-[8px] font-bold opacity-70 italic">฿ {info.price || floor.price}</div>
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white p-12 rounded-[3rem] border shadow-sm text-center">
                                <h2 className="text-5xl font-black italic tracking-tighter text-slate-800 uppercase leading-none">Summary Report</h2>
                                <p className="text-slate-400 mt-2 font-bold uppercase tracking-widest text-[10px]">Cloud Database Live Statistics</p>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mt-12">
                                    {Object.keys(STATUS_CONFIG).map(k => (
                                        <div key={k} className={`${STATUS_CONFIG[k].light} p-6 rounded-[2rem] border-2 ${STATUS_CONFIG[k].border} shadow-sm`}>
                                            <p className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest leading-none">{STATUS_CONFIG[k].label.split(' ')[0]}</p>
                                            <p className={`text-4xl font-black ${STATUS_CONFIG[k].iconColor}`}>
                                                {Object.values(roomStates).filter(r => r.status === k).length}
                                            </p>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => window.print()} className="mt-12 bg-slate-900 text-white px-10 py-5 rounded-2xl font-black text-xl hover:bg-black shadow-2xl active:scale-95 transition-all flex items-center gap-3 mx-auto">
                                    <i data-lucide="printer" className="w-6 h-6"></i> พิมพ์รายงาน PDF
                                </button>
                            </div>
                        )}
                    </main>

                    {/* Editor Modal */}
                    {selectedRoom && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-end sm:items-center justify-center z-50 no-print p-0 sm:p-4">
                            <form onSubmit={handleUpdateStatus} className="bg-white rounded-t-[3rem] sm:rounded-[4rem] w-full max-w-md overflow-hidden shadow-2xl animate-in slide-in-from-bottom duration-500">
                                <div className="bg-slate-900 p-10 text-white flex justify-between items-center relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full -translate-y-16 translate-x-16"></div>
                                    <div>
                                        <h3 className="text-5xl font-black italic tracking-tighter leading-none relative z-10 uppercase">Room {selectedRoom}</h3>
                                        <p className="text-indigo-400 text-[10px] font-black tracking-widest mt-2 uppercase">{activeProperty.name}</p>
                                    </div>
                                    <button type="button" onClick={() => setSelectedRoom(null)} className="p-3 bg-white/10 rounded-full hover:bg-white/20 transition-all relative z-10"><i data-lucide="x"></i></button>
                                </div>
                                <div className="p-10 space-y-6">
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                        {Object.entries(STATUS_CONFIG).map(([key, cfg]) => (
                                            <label key={key} className={`p-4 rounded-2xl border-2 font-black flex flex-col items-center gap-1 cursor-pointer transition active:scale-95 ${tempStatus === key ? 'border-indigo-600 bg-indigo-50 text-indigo-700 shadow-md shadow-indigo-100' : 'border-slate-100 text-slate-300'}`}>
                                                <input type="radio" name="status" checked={tempStatus === key} onChange={() => setTempStatus(key)} className="hidden" />
                                                <div className={`w-3 h-3 rounded-full ${cfg.color} ${tempStatus === key ? 'ring-4 ring-indigo-200' : ''}`}></div> 
                                                <span className="text-[10px] uppercase tracking-tighter">{cfg.label.split(' ')[0]}</span>
                                            </label>
                                        ))}
                                    </div>
                                    <div className="bg-slate-50 p-8 rounded-[2.5rem] space-y-4 border border-slate-100 shadow-inner">
                                        <p className="text-[10px] font-black text-indigo-600 uppercase tracking-widest ml-2">ราคาพิเศษ (ถ้ามี)</p>
                                        <input name="customPrice" placeholder="ระบุราคา..." className="w-full p-5 rounded-2xl shadow-sm border-none font-bold text-lg outline-none focus:ring-4 ring-indigo-100 transition-all" defaultValue={roomStates[`${activePropertyId}_${selectedRoom}`]?.price || ""} />
                                    </div>
                                    <button type="submit" disabled={isSaving} className="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black text-2xl shadow-2xl shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all flex items-center justify-center gap-3 disabled:bg-slate-300">
                                        {isSaving ? <div className="w-6 h-6 border-4 border-white border-t-transparent rounded-full animate-spin"></div> : <><i data-lucide="save"></i> SAVE TO CLOUD</>}
                                    </button>
                                    {!db && <p className="text-rose-500 text-[10px] font-bold text-center uppercase tracking-widest italic animate-pulse">Demo Mode: ข้อมูลจะไม่ถูกบันทึกลงคลาวด์</p>}
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
